# lightning.pytorch==2.1.4
seed_everything: 1234
trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: null
  logger:
    class_path: lightning.pytorch.loggers.TensorBoardLogger
    init_args:
      save_dir: logs/pix2pix
      name: facades
      version: null
      log_graph: false
      default_hp_metric: true
      prefix: ''
      sub_dir: null
      comment: ''
      purge_step: null
      max_queue: 10
      flush_secs: 120
      filename_suffix: ''
  callbacks:
  - class_path: pytorchlab.callbacks.LossCallback
  - class_path: pytorchlab.callbacks.ImageCallback
  fast_dev_run: false
  max_epochs: 10
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: null
  enable_checkpointing: null
  enable_progress_bar: null
  enable_model_summary: null
  accumulate_grad_batches: 1
  gradient_clip_val: null
  gradient_clip_algorithm: null
  deterministic: null
  benchmark: null
  inference_mode: true
  use_distributed_sampler: true
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins: null
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: null
ckpt_path: null
data:
  class_path: pytorchlab.datamodules.DataModule
  init_args:
    train_datasets:
      class_path: pytorchlab.datasets.SplitDataset
      init_args:
        dataset:
          class_path: pytorchlab.datasets.ImagePairDataset
        split: 0.2
        seed: 42
        train: true
    val_datasets:
      class_path: pytorchlab.datasets.SplitDataset
      init_args:
        dataset:
          class_path: pytorchlab.datasets.ImagePairDataset
          init_args:
            root: dataset
            train: true
            transform: torchvision.transforms.ToTensor
            target_transform: null
            download: true
        split: 0.2
        seed: 42
        train: false
    test_datasets:
      class_path: pytorchlab.datasets.ImagePairDataset
    predict_datasets:
      class_path: pytorchlab.datasets.ImagePairDataset
    batch_size: 8
    num_workers: 4
    pin_memory: true
    drop_last: false
    collate_fn: null
model:
  class_path: pytorchlab.modules.Pix2PixModule
